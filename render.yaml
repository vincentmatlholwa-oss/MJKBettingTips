services:
  - type: web
    name: mjkbettingtips
    env: node
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: mjkbetting-data
      mountPath: /var/data
      sizeGB: 1
