services:
  - type: web
    name: mjkbettingtips
    env: node
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_DISK_PATH
        value: /var/data
      - key: SPORTMONKS_API_KEY
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_GROUP_ID
        sync: false
      - key: WHATSAPP_INSTANCE_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: GITHUB_BACKUP_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: mjkbetting-data
      mountPath: /var/data
      sizeGB: 1
